services:
  api:
    image: ghcr.io/${GITHUB_REPOSITORY_OWNER}/on-seoul-api:${API_TAG:-latest}
    container_name: on-seoul-api
    ports:
      - "49891:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=dev
    env_file:
      - .env.deploy
      - .env.api
    restart: always
    networks:
      - on-seoul-net

  agent:
    image: ghcr.io/${GITHUB_REPOSITORY_OWNER}/on-seoul-agent:${AGENT_TAG:-latest}
    container_name: on-seoul-agent
    ports:
      - "49890:8000"
    environment:
      # OpenTelemetry → SigNoz (docker-compose-signoz.yml). 비밀 아님 → 가시성/재현성 위해 compose 에 직접 명시.
      # OTEL_ENABLED 미설정 시 계측 no-op(기본 off). 같은 on-seoul-net 으로 on-seoul-signoz:4317 도달.
      - OTEL_ENABLED=true
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://on-seoul-signoz:4317
      - OTEL_SERVICE_NAME=on-seoul-agent
      - OTEL_ENVIRONMENT=prod
      - OTEL_EXPORTER_OTLP_TIMEOUT=10
      - OTEL_METRIC_EXPORT_INTERVAL_MS=60000
    env_file:
      - .env.deploy
      - .env.agent
    restart: always
    networks:
      - on-seoul-net

# on-seoul-net 은 Redis compose(docker-compose-redis.yml 등)에서 먼저 생성된다.
# 이 파일은 해당 네트워크에 참여만 한다(external).
# 배포 순서: Redis compose up → 이 파일 up
networks:
  on-seoul-net:
    external: true
