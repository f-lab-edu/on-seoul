spring:
  application:
    name: on-seoul-api

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      connection-init-sql: "SET TIME ZONE 'UTC'"
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
    show-sql: false
    open-in-view: false
  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD}

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
            authorization-grant-type: authorization_code
            scope:
              - openid
              - email
              - profile
          kakao:
            client-id: ${KAKAO_CLIENT_ID}
            client-secret: ${KAKAO_CLIENT_SECRET}
            client-authentication-method: client_secret_post
            authorization-grant-type: authorization_code
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
            scope:
              - profile_nickname
              - account_email
            client-name: Kakao
        provider:
          google:
            authorization-uri: https://accounts.google.com/o/oauth2/auth
            token-uri: https://oauth2.googleapis.com/token
            user-info-uri: https://www.googleapis.com/oauth2/v2/userinfo
            user-name-attribute: sub
          kakao:
            authorization-uri: https://kauth.kakao.com/oauth/authorize
            token-uri: https://kauth.kakao.com/oauth/token
            user-info-uri: https://kapi.kakao.com/v2/user/me
            user-name-attribute: id

app:
  frontend-base-url: ${FRONTEND_BASE_URL:http://localhost:3000}
  encryption:
    aes-key: ${APP_AES_KEY}
    blind-idx-key: ${APP_BLIND_IDX_KEY}
  # HTTPS 환경에서는 true(기본값). 로컬 HTTP 개발 시 COOKIE_SECURE=false 로 재정의.
  cookie-secure: ${COOKIE_SECURE:true}
  cookie-same-site: ${COOKIE_SAME_SITE:Strict} # Strict, Lax, None 중 선택. 로컬 개발 시 None으로 재정의 권장.
  # 쿠키 Domain 속성. 서브도메인 간 공유 시 ".jazzz.dev" 형식으로 설정.
  # 로컬 개발에서는 빈 값(기본값)으로 두면 localhost에만 스코프됨.
  cookie-domain: ${COOKIE_DOMAIN:}
  # HMAC-SHA256 쿠키 서명 키 — 32바이트 이상의 랜덤 값을 Base64 인코딩. 필수 환경변수.
  cookie-signing-key: ${COOKIE_SIGNING_KEY}
  cors:
    # 쉼표로 구분된 허용 Origin 목록. 와일드카드 패턴 지원 (예: https://*.example.com).
    # 로컬 개발 기본값: localhost 3000/5173 포트. 운영에서는 CORS_ALLOWED_ORIGINS 환경변수로 재정의.
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173}
jwt:
  secret: ${JWT_SECRET}
  access-token-minutes: 15
  refresh-token-minutes: 10080

seoul:
  api:
    key: ${SEOUL_OPENAPI_KEY}
    base-url: http://openapi.seoul.go.kr:8088
    page-size: 200
    max-retries: 3
    max-backoff-seconds: 10
    connect-timeout-ms: 10000
    response-timeout-seconds: 30

kakao:
  api:
    key: ${KAKAO_REST_API_KEY}
ai:
  service:
    url: ${AI_SERVICE_URL:http://localhost:8000}
    stream-timeout-seconds: 120
    template-timeout-seconds: 10  # ADR-0004: AI 호출 timeout
    # Phase 7: 임베딩 동기화(POST /embeddings/services/sync) 호출 timeout.
    # 청크당 최대 500건이므로 템플릿 생성보다 넉넉하게 설정한다.
    embedding-sync-timeout-seconds: 30

chat:
  history:
    # AI 서비스로 전달할 직전 턴(USER+ASSISTANT 쌍) 수. 최대 메시지 수는 max-turns * 2.
    max-turns: 5
    # 메시지당 content 길이 캡(초과 시 truncate).
    max-chars-per-message: 1000

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never

knock:
  api-key: ${KNOCK_API_KEY}    # Knock API 키. 필수 — 미설정 시 앱 시작 실패
  email-workflow-key: "service-change-email"
  sms-workflow-key: "service-change-sms"
  timeout-seconds: 10

notification:
  scheduler:
    # fixed-delay-ms 는 더 이상 사용되지 않는다.
    # NotificationScheduler 는 EmbeddingSyncCompletedEvent(임베딩 동기화 완료 이벤트) 수신 시 1회 실행된다.
    # 처리 순서: 수집 → 임베딩 동기화 → 알림.
    stale-threshold-ms: 600000   # 10분 — stale RUNNING batch 회수 임계값
  retry-scheduler:
    fixed-delay-ms: 3600000  # 1시간

resilience4j:
  circuitbreaker:
    instances:
      knock:
        sliding-window-type: COUNT_BASED
        sliding-window-size: 10
        # minimum-number-of-calls 기본값은 100 → 윈도우(10)보다 커서 실패율이 평가되지 않아
        # 서킷이 절대 열리지 않는다. 윈도우 크기에 맞춰 10으로 명시해야 실제로 동작한다.
        minimum-number-of-calls: 10
        failure-rate-threshold: 50          # 10회 중 5회 실패 시 OPEN
        wait-duration-in-open-state: 60s    # OPEN → HALF_OPEN 전환 대기
        permitted-number-of-calls-in-half-open-state: 3
        register-health-indicator: true

logging:
  level:
    dev.jazzybyte: debug
    # [PII 보호] reactor.netty 이하를 DEBUG 이하로 설정하면 KnockNotificationAdapter의
    # 요청 본문(recipients.email, phone_number)이 HTTP body 로그로 노출된다.
    # 운영 환경에서는 reactor.netty 로그 레벨을 WARN 이상으로 유지해야 한다.
    reactor.netty: warn
