name: deploy api

on:
  push:
    branches: [main]
    paths:
      - 'on-seoul-api/**'

jobs:
  build:
    runs-on: ubuntu-latest        # GitHub 호스팅 runner — 빌드 전용
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
        working-directory: ./on-seoul-api

      - name: Build bootJar with Gradle
        run: ./gradlew :app:bootJar -x test
        working-directory: ./on-seoul-api

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./on-seoul-api
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/on-seoul-api:latest
            ghcr.io/${{ github.repository_owner }}/on-seoul-api:${{ github.sha }}

  deploy:
    needs: build
    runs-on: self-hosted          # 서버에 설치된 runner — 배포 전용
    steps:
      - uses: actions/checkout@v4

      - name: Deploy api
        env:
          SHA: ${{ github.sha }}
          REPO_OWNER: ${{ github.repository_owner }}
        run: |
          mkdir -p ~/on-seoul

          # docker-compose-app.yml은 레포 정본 기준으로 항상 갱신
          cp docker-compose-app.yml ~/on-seoul/

          # .env.secret 존재 확인 (DB 접속정보 등 민감정보 — 서버에 미리 수동으로 생성해둬야 함)
          if [ ! -f ~/on-seoul/.env.secret ]; then
            echo "ERROR: ~/on-seoul/.env.secret not found. Create it before first deployment."
            exit 1
          fi

          cd ~/on-seoul

          # .env.deploy: CI에서 결정되는 변수들 (이미지 태그, 레포 소유자)
          echo "API_TAG=${SHA}" > .env.deploy
          echo "GITHUB_REPOSITORY_OWNER=${REPO_OWNER,,}" >> .env.deploy

          docker compose -f docker-compose-app.yml --env-file .env.deploy pull api
          docker compose -f docker-compose-app.yml --env-file .env.deploy up -d --no-deps api
          docker image prune -f

