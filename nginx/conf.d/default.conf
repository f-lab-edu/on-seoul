# on-seoul Nginx 가상 호스트 설정
# API Service (Spring Boot :8080) 를 프록시한다.
#
# 수평 확장 시 upstream 블록에 레플리카를 추가하거나
# AWS ALB / Docker Swarm DNS round-robin 으로 대체한다.

upstream api_upstream {
    server api:8080;
    # ── 10 레플리카 확장 예시 ──────────────────────────────────
    # Docker Swarm 에서는 서비스 DNS 하나로 round-robin 처리된다:
    #   server on-seoul_api:8080;  (Swarm task DNS)
    # Kubernetes 에서는 Service ClusterIP + HPA 를 사용한다.
    # 명시적 다중 upstream 예시 (레플리카 고정 IP 사용 시):
    #   server api:8080;
    #   server api_2:8080;
    #   ... (최대 10개)
    # SSE sticky session 불필요: 스트림은 단일 TCP 수명이고
    # 대화 이력은 PG 공유 스토리지에 저장된다.
    keepalive 64;
}

server {
    listen 80;
    server_name _;

    # ── Nginx 헬스체크 ────────────────────────────────────────────
    location = /healthz {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    # ── SSE 경로: /chat/stream ────────────────────────────────────
    # 모든 버퍼링을 비활성화하여 이벤트가 즉시 클라이언트에 도달하도록 한다.
    location /chat/stream {
        proxy_pass http://api_upstream;

        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE 필수 지시어
        proxy_buffering             off;
        proxy_cache                 off;
        proxy_request_buffering     off;
        proxy_read_timeout          3600s;   # 1시간: 장시간 스트림 유지
        proxy_send_timeout          3600s;

        chunked_transfer_encoding   on;
        add_header X-Accel-Buffering no always;
        add_header Cache-Control    no-cache always;

        # SSE 스트림은 gzip 압축 불필요 (증분 청크를 즉시 전송해야 함)
        gzip                        off;
    }

    # ── 일반 API 경로 ─────────────────────────────────────────────
    location / {
        proxy_pass http://api_upstream;

        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }
}
