services:
  signoz:
    image: signoz/signoz-standalone:v0.0.3
    container_name: on-seoul-signoz
    restart: unless-stopped
    privileged: true          # signoz-standalone 필수 (eBPF/시스템 메트릭 수집)
    ports:
      - "49880:8080"          # Web UI + Query API (단일 포트 통합)
                              # OTLP gRPC 4317, HTTP 4318 은 호스트 미노출 —
                              # 같은 on-seoul-net 안에서 on-seoul-signoz:4317 로만 도달
    environment:
      TZ: Asia/Seoul
    volumes:
      # 영속 데이터. DIR_ROOT 미설정 시 현재 디렉터리(~/on-seoul) 기준 ./data/... 로 생성된다.
      - ${DIR_ROOT:-.}/data/signoz/clickhouse:/var/lib/clickhouse
      - ${DIR_ROOT:-.}/data/signoz/data:/var/lib/signoz
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "localhost:8080/api/v1/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s
    networks:
      - on-seoul-net

# on-seoul-net 은 Redis compose(docker-compose-redis.yml 등)에서 먼저 생성된다.
# 이 파일은 해당 네트워크에 참여만 한다(external).
#
# 배포 순서: Redis compose up → 이 SigNoz compose up → app compose(docker-compose-app.yml) up
#   - SigNoz 는 상태 저장(ClickHouse 볼륨) 서비스이므로 1회 수동 기동 후 상주시킨다.
#   - agent 는 OTEL fail-open 이라 SigNoz 가 없어도 정상 기동하지만,
#     트레이스/메트릭/로그 수집을 위해 SigNoz 가 먼저 떠 있어야 한다.
#
# 기동:    docker compose -f docker-compose-signoz.yml up -d
# 상태:    docker compose -f docker-compose-signoz.yml ps
# UI:      http://<host>:49880
networks:
  on-seoul-net:
    external: true
