services:
  api:
    image: ghcr.io/${GITHUB_REPOSITORY_OWNER}/on-seoul-api:${API_TAG:-latest}
    container_name: on-seoul-api
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/onseoul
      - SPRING_DATASOURCE_USERNAME=jazz
      - SPRING_DATASOURCE_PASSWORD=${DB_PASSWORD}
      - SPRING_DATA_REDIS_HOST=redis
    depends_on:
      - postgres
      - redis
    networks:
      - on-seoul-network
    restart: always

  postgres:
    image: postgres:16-alpine
    container_name: on-seoul-db
    environment:
      - POSTGRES_DB=onseoul
      - POSTGRES_USER=jazz
      - POSTGRES_PASSWORD=${DB_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - on-seoul-network
    restart: always

  redis:
    image: redis:7-alpine
    container_name: on-seoul-redis
    ports:
      - "6379:6379"
    networks:
      - on-seoul-network
    restart: always

networks:
  on-seoul-network:
    driver: bridge

volumes:
  postgres_data:
