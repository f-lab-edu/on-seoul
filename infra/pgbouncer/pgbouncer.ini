; PgBouncer configuration for on-seoul
; 이 파일을 컨테이너에 직접 마운트한다:
;   volumes:
;     - ./infra/pgbouncer/pgbouncer.ini:/etc/pgbouncer/pgbouncer.ini:ro
;
; 실제 시크릿(DB_HOST, 비밀번호 등)은 반드시 환경변수 또는 .env.pgbouncer 에서 주입한다.
; 이 파일에 실제 값을 넣어 커밋하지 않는다.
;
; 주의: ${VAR} 치환은 edoburu/pgbouncer entrypoint 가 envsubst 로 처리한다.
;       직접 pgbouncer 바이너리를 구동하는 경우 envsubst 를 별도로 수행해야 한다.

[databases]
; 풀 예산: on_ai(80) + on_data(≤40) ≤ PG max_connections(200). 헤드룸 충분.

; on_ai — on_ai_app 단일 롤. pool_size 80 (집계 1000 QPS 기준 평균 active 추정).
on_ai = host=on-seoul-postgres port=5432 dbname=on_ai user=on_ai_app pool_size=80

; on_data — user= 생략으로 클라이언트 롤 pass-through.
;   on_data_app(CRUD) / on_data_reader(SELECT)이 같은 엔트리로 들어와 (db,롤)별 풀이 자동 생성됨.
;   → SELECT 전용 격리가 PgBouncer를 거쳐도 PG 롤 권한으로 그대로 보존.
;   max_db_connections=40: 두 풀 합산 서버 커넥션 캡 (per-user 폭증 방지). pool_size=40은 각 풀 상한.
;   ⚠️ 조건: userlist.txt에 on_data_reader 자격증명 필수 (없으면 AI 읽기 경로만 부분 장애).
;      AI 서비스 .env: ON_DATA_DATABASE_URL=...on_data_reader:<pw>@pgbouncer:5432/on_data
;   참고: app/reader가 40 캡 공유 → 한쪽 버스트 시 다른 쪽 고갈 가능.
;      롤별 용량 격리 필요 시 별칭 풀(on_data_ro = ... user=on_data_reader pool_size=N) 추가.
on_data = host=on-seoul-postgres port=5432 dbname=on_data pool_size=40 max_db_connections=40

[pgbouncer]
listen_addr          = *
listen_port          = 5432

; Transaction mode: SQLAlchemy asyncpg 와 조합 시 statement_cache_size=0 필수
; (on-seoul-agent core/database.py 에 이미 설정됨 — on_ai/on_data 두 엔진 모두)
pool_mode            = transaction

; 클라이언트 커넥션 상한
; 근거: 5 인스턴스 × (on_ai cap 50 + on_data cap 30) = 400 + 헤드룸 200
max_client_conn      = 600

; 기본 서버 풀 크기 — [databases] 섹션의 pool_size 가 우선 적용되므로 fallback 값
default_pool_size    = 20

; 예비 풀 (burst 흡수)
reserve_pool_size    = 10
reserve_pool_timeout = 3

; 유휴 서버 커넥션 유지 (cold start 방지)
min_pool_size        = 5

; 인증 — scram-sha-256 기본 (secure-by-default)
; scram-sha-256 은 PostgreSQL 14+ / PgBouncer 1.18+ 에서 지원되며,
; 본 스택(PgBouncer 1.23.1 · PostgreSQL 18)은 둘 다 충족한다.
; PG 18 의 password_encryption 기본값이 scram-sha-256 이므로 md5 기본은 DB 기본과 어긋난다.
; 신규 인프라라 레거시 md5 호환은 불필요 → 처음부터 scram 으로 고정한다.
;
; SCRAM 은 4곳이 동시에 일치해야 동작한다. auth_type 만 바꾸면 PgBouncer 가 PG 에
; 인증 실패로 못 붙어 전면 장애가 난다. 4곳:
;   (1) [이 파일] auth_type = scram-sha-256
;   (2) [PG-side] 롤 비밀번호가 SCRAM 형식으로 저장
;   (3) [PG-side] pg_hba.conf 의 METHOD = scram-sha-256
;   (4) [운영 배포] userlist.txt 에 PG rolpassword(SCRAM verifier) 주입
; (2)(3)(4) 는 리포 밖(관리형 PG / 배포 파이프라인) 책임이다. 아래 prerequisite 참조.
;
; ─────────────────────────────────────────────────────────────────────────────
; 배포 prerequisite (PG-side 3단계) — ⚠️ 미적용 상태로 이 .ini 만 배포하면 전면 인증 장애
; ─────────────────────────────────────────────────────────────────────────────
;  1) 롤 비밀번호가 SCRAM 저장인지 확인:
;       SELECT rolname, left(rolpassword,13)
;         FROM pg_authid
;        WHERE rolname IN ('on_ai_app','on_data_app','on_ai_reader','pgbouncer');
;     - 'SCRAM-SHA-256' 로 시작하면 OK.
;     - 'md5...' 이면 SCRAM 으로 재생성:
;         SET password_encryption = 'scram-sha-256';
;         ALTER ROLE <role> PASSWORD '<plaintext>';   -- 저장 시 자동으로 SCRAM 인코딩
;     - PG 18 기본이 scram 이므로 신규 생성 롤은 보통 자동으로 SCRAM 저장된다.
;  2) pg_hba.conf 의 METHOD 를 scram-sha-256 으로 일치 후 reload:
;     - 관리형 PG(RDS 등)는 직접 편집 대신 파라미터 그룹/콘솔에서 설정.
;       (예: rds.force_ssl + 인증 정책) 적용 후 reload/적용.
;  3) 운영 userlist.txt 에 PG pg_authid.rolpassword 의 SCRAM-SHA-256$... verifier 를 그대로 주입.
;     - verifier 추출: SELECT rolname, rolpassword FROM pg_authid WHERE rolname IN (...);
;     - ⚠️ 실제 verifier 는 절대 커밋 금지. CI/CD 시크릿(Vault/SSM)에서 주입.
;
; 대안(이번 범위 밖): userlist.txt 대신 auth_query 로 PG 에서 verifier 를 동적 조회할 수도 있으나,
; 본 스택은 userlist.txt 주입 방식을 유지한다(변경 최소화).
auth_type            = scram-sha-256
auth_file            = /etc/pgbouncer/userlist.txt

; 로그 (운영 시 0으로 낮춤)
log_connections      = 0
log_disconnections   = 0

; 트랜잭션 모드에서 세션 상태 초기화
server_reset_query   = DISCARD ALL