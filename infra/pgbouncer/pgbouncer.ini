; PgBouncer configuration for on-seoul
; 이 파일을 컨테이너에 직접 마운트한다:
;   volumes:
;     - ./infra/pgbouncer/pgbouncer.ini:/etc/pgbouncer/pgbouncer.ini:ro
;
; 실제 시크릿(DB_HOST, 비밀번호 등)은 반드시 환경변수 또는 .env.pgbouncer 에서 주입한다.
; 이 파일에 실제 값을 넣어 커밋하지 않는다.
;
; 주의: ${VAR} 치환은 edoburu/pgbouncer entrypoint 가 envsubst 로 처리한다.
;       직접 pgbouncer 바이너리를 구동하는 경우 envsubst 를 별도로 수행해야 한다.

[databases]
; 집계 기준: 최대 5 인스턴스 × 200 QPS = 1000 QPS 집계,
; 클라이언트 커넥션 합 5×(on_ai cap 50 + on_data cap 30) = 400.

; on_ai DB  — on_ai_app 유저용 풀 (AI 서비스)
; pool_size 80 근거: 1000 QPS 집계(5×200)에서 on_ai 평균 active
;   λ=4000/s × 0.02s = 80 (서버측 동시 활성 커넥션 추정)
on_ai = host=${PGBOUNCER_PG_HOST} port=${PGBOUNCER_PG_PORT} dbname=on_ai \
        user=${PGBOUNCER_ON_AI_USER} pool_size=80

; on_data DB — on_data_app 유저용 풀 (API 서비스 / Spring Boot)
; pool_size 40 근거: 동일 집계에서 on_data 평균 active 추정 40
on_data = host=${PGBOUNCER_PG_HOST} port=${PGBOUNCER_PG_PORT} dbname=on_data \
          user=${PGBOUNCER_ON_DATA_USER} pool_size=40

[pgbouncer]
listen_addr          = *
listen_port          = 5432

; Transaction mode: SQLAlchemy asyncpg 와 조합 시 statement_cache_size=0 필수
; (on-seoul-agent core/db.py 에 이미 설정됨)
pool_mode            = transaction

; 클라이언트 커넥션 상한
; 근거: 5 인스턴스 × (on_ai cap 50 + on_data cap 30) = 400 + 헤드룸 200
max_client_conn      = 600

; 기본 서버 풀 크기 — [databases] 섹션의 pool_size 가 우선 적용되므로 fallback 값
default_pool_size    = 20

; 예비 풀 (burst 흡수)
reserve_pool_size    = 10
reserve_pool_timeout = 3

; 유휴 서버 커넥션 유지 (cold start 방지)
min_pool_size        = 5

; 인증
; auth_type = md5 는 구형 호환을 위한 기본값이다.
; PostgreSQL 14+ / PgBouncer 1.18+ 환경이라면 scram-sha-256 으로 업그레이드를 권장한다.
; scram-sha-256 사용 시 pg_hba.conf 의 METHOD 도 scram-sha-256 으로 일치시켜야 하며
; userlist.txt 에는 scram 해시("SCRAM-SHA-256$...") 또는 평문 비밀번호를 사용한다.
auth_type            = md5
auth_file            = /etc/pgbouncer/userlist.txt

; 로그 (운영 시 0으로 낮춤)
log_connections      = 0
log_disconnections   = 0

; 트랜잭션 모드에서 세션 상태 초기화
server_reset_query   = DISCARD ALL
